name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} << 'ENDSSH'
            set -e

            # Load NVM if available, otherwise use system Node
            export NVM_DIR="$HOME/.nvm"
            if [ -f "$NVM_DIR/nvm.sh" ]; then
              source "$NVM_DIR/nvm.sh"
            elif [ -f "/usr/local/nvm/nvm.sh" ]; then
              source "/usr/local/nvm/nvm.sh"
            else
              export PATH="$PATH:/usr/local/bin:/usr/bin"
            fi

            cd /var/www/backend-yunlai-porcelian-art-co

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            npm install --omit=dev

            echo "🔨 Building TypeScript..."
            npm run build

            echo "♻️ Restarting PM2..."
            pm2 restart yunlai-porcelian-art-co
            pm2 save

            echo "✅ Deployment complete!"
            pm2 status
          ENDSSH
