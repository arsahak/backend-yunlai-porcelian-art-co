name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install all dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Setup SSH key file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Copy dist to server
        run: |
          scp -i ~/.ssh/deploy_key -r dist ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }}:/var/www/backend-yunlai-porcelian-art-co/

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} << 'ENDSSH'
            set -e
            export NVM_DIR="/root/.nvm"
            source "$NVM_DIR/nvm.sh"

            cd /var/www/backend-yunlai-porcelian-art-co

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing production dependencies..."
            npm install --omit=dev

            echo "♻️ Reloading PM2..."
            pm2 reload yunlai-porcelian-art-co --update-env
            pm2 save

            echo "✅ Deployment complete!"
            pm2 status
          ENDSSH
